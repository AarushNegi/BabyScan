<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabyScan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="scope-sweep" id="sweep"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◎</span>
    <span class="brand-name">BabyScan</span>
  </div>
  <div class="brand-sub">network reconnaissance console</div>
</header>

<main class="layout">

  <section class="panel control-panel">
    <div class="field">
      <label for="network">target network</label>
      <input id="network" type="text" placeholder="192.168.1.0/24" autocomplete="off">
    </div>
    <div class="field">
      <label for="ports">port range</label>
      <input id="ports" type="text" placeholder="1-1000" value="1-1000" autocomplete="off">
    </div>
    <div class="field field-toggle">
      <label for="cve">
        <input id="cve" type="checkbox">
        <span>cross-reference cves</span>
      </label>
    </div>
    <button id="scanBtn" class="scan-btn">
      <span class="scan-btn-label">run scan</span>
    </button>
  </section>

  <section class="status-line" id="statusLine">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">idle — configure a target and run a scan</span>
  </section>

  <section class="results" id="results"></section>

</main>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
